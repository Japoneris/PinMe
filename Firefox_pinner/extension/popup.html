<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 180px;
      padding: 12px;
      font-family: sans-serif;
      text-align: center;
    }
    button {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      color: white;
    }
    button.on  { background: #28a745; }
    button.off { background: #dc3545; }
    #status {
      margin-top: 8px;
      font-size: 13px;
      color: #555;
    }
  </style>
</head>
<body>
  <button id="toggleBtn" class="off">OFF</button>
  <div id="status">Collection disabled</div>
  <script src="popup.js"></script>
</body>
</html>
